<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I-Tanim | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="welcome">Welcome to I-Tanim</div>
        <div class="brand">LOGIN</div>
        
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        
        <label class="options">
            <input type="checkbox" id="remember"> Remember me
        </label>
        
        <button class="btn-login" id="login-btn">LOGIN</button>
        
        <div class="divider">OR</div>
        
        <button class="btn-google" id="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="G"> 
            Sign in with Google
        </button>
        
        <div class="footer">Not a member? <a href="signup.html">Register now</a></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA_WAoRxS0XtSBHO4GKOUPeo9IxSuo9m8E",
            authDomain: "i-tanim.firebaseapp.com",
            projectId: "i-tanim",
            storageBucket: "i-tanim.firebasestorage.app",
            messagingSenderId: "543718035125",
            appId: "1:543718035125:web:92261781c28eec00c738fc"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => { if (user) window.location.href = "dashboard.html"; });

        document.getElementById("login-btn").onclick = async () => {
            const isRemembered = document.getElementById("remember").checked;
            try {
                await setPersistence(auth, isRemembered ? browserLocalPersistence : browserSessionPersistence);
                await signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value);
            } catch (e) { alert("Error: " + e.message); }
        };

        document.getElementById("google-btn").onclick = async () => {
            try { await signInWithPopup(auth, provider); } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
